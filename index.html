<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐕 Dog Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>👾 Explorador de Games</h1>
        <p class="subtitle">Consumindo nossa própria API em Node.js</p>

        <div class="game-area">
            <img src="" alt="jogos" id="gameImage">
            <div id="breedName"></div>
        </div>

        <div class="controls">
            <button id="randomBtn">🎲 Games Aleatório</button>
        </div>

        <div class="search">
            <input
                type="text"
                id="breedInput"
                placeholder="Digite um jogo (ex:  minecraft, doom)"
            >
            <button id="searchBtn">🔍 Buscar</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
